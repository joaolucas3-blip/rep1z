<!DOCTYPE html>
<html>
    <head>
        <title>Primeiro Form, ou qs</title>
    </head>
    <body>
        <h1>Cadastro</h1>
    <!--
        Form define um formu
        Action - Destino do formu
        Method - Como são enviados
    -->
        <form action="" method="post">
            <p>Digite seu nome:
                <input type="text" name="nome"></p>
            <p>Digite seu CPF:
                <input type="text" name="cpf"></p>
            <p>Digite sua senha:
                <input type="password" name="senha"></p>
            <p> Data de nascimento:
                <input type="date" name="nascimento">
            </p>
            <p> Selecione uma cor
                <input type="color" name="cor">
            </p>
        </form>
    </body>
</html>
